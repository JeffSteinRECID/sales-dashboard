document.getElementById('freshness').textContent='QB: '+SNAP.qb+' | Zoho: '+SNAP.zoho+' | Built: '+SNAP.ts;
['sports','dormant','declining','lapsed','medals','awards','badges'].forEach(function(k){var el=document.getElementById('cnt-'+k);if(el)el.textContent=SNAP[k].length;});
function onFilter(){page=0;render();}
function sel(id){
  cur=id;page=0;
  document.querySelectorAll('.sc-btn').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('btn-'+id);if(btn)btn.classList.add('active');
  var s=SCEN[id];
  document.getElementById('sc-title').innerHTML=s.title;
  document.getElementById('sc-controls').innerHTML=s.ctls||'';
  document.getElementById('search').value='';
  render();
}
function render(){
  var s=SCEN[cur];var all=SNAP[cur]||[];filtered=s.filter(all);
  var sf=document.getElementById('status-filter').value;
  if(sf){filtered=filtered.filter(function(r){return(getLS(r[0]).status||'New')===sf;})}
  var af=document.getElementById('action-filter').value;
  if(af!==undefined&&af!==null&&document.getElementById('action-filter').selectedIndex>0){filtered=filtered.filter(function(r){return(getLS(r[0]).action||'')===af;});}
  var total=filtered.length;var start=page*pageSize;
  var end=Math.min(start+pageSize,total);var pageRows=filtered.slice(start,end);
  var totalPages=Math.ceil(total/pageSize)||1;
  var h='';
  if(s.note)h+='<div class="note-banner">&#x2139; '+s.note+'</div>';
  h+='<div class="results-meta"><span><strong>'+total.toLocaleString()+'</strong> customer'+(total!==1?'s':'')+(total<all.length?' (filtered from '+all.length.toLocaleString()+')':'')+'</span>';
  h+='<span style="color:#94a3b8;font-size:10.5px">Showing '+(start+1)+'&ndash;'+end+' of '+total.toLocaleString()+'</span></div>';
  h+='<div class="tbl-wrap"><table><thead>'+s.hdr+'</thead><tbody>';
  if(!pageRows.length){h+='<tr><td colspan="10" style="text-align:center;padding:30px;color:#94a3b8">No customers match.</td></tr>';}
  else{pageRows.forEach(function(r,i){h+=s.row(r,start+i);});}
  h+='</tbody></table></div>';
  var pd=page<=0;var nd=page>=totalPages-1;
  h+='<div class="pagination">';
  h+='<button class="pg-btn" onclick="goPage(0)" '+(pd?'disabled':'')+'>&laquo;</button>';
  h+='<button class="pg-btn" onclick="goPage('+(page-1)+')" '+(pd?'disabled':'')+'>&lsaquo; Prev</button>';
  h+='<span class="pg-info">Page '+(page+1)+' of '+totalPages+'</span>';
  h+='<button class="pg-btn" onclick="goPage('+(page+1)+')" '+(nd?'disabled':'')+'>Next &rsaquo;</button>';
  h+='<button class="pg-btn" onclick="goPage('+(totalPages-1)+')" '+(nd?'disabled':'')+'>&raquo;</button>';
  h+='<select class="pg-size" onchange="pageSize=parseInt(this.value);page=0;render()">';
  [50,100,250,9999].forEach(function(v){h+='<option value="'+v+'"'+(pageSize===v?' selected':'')+'>'+(v===9999?'All':v+'/page')+'</option>';});
  h+='</select></div>';
  document.getElementById('results').innerHTML=h;
}
function goPage(p){page=p;render();document.getElementById('results').scrollTop=0;}
sel('sports');
