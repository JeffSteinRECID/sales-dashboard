    ctls:'<div class="ctl"><label>Min 2024 $</label><input type="number" id="c1" value="500" min="0" step="100" oninput="onFilter()"></div><div class="ctl"><label>Drop</label><select id="c2" onchange="onFilter()"><option value="20">20%+</option><option value="40" selected>40%+</option><option value="60">60%+</option><option value="80">80%+</option></select></div><div class="ctl"><label>Sector</label><select id="c3" onchange="onFilter()">'+sOpts+'</select></div>',
    filter:function(rows){var min=parseFloat(document.getElementById('c1').value)||0;var dm=parseFloat(document.getElementById('c2').value)||40;var s=document.getElementById('c3').value;var q=(document.getElementById('search').value||'').toLowerCase();return rows.filter(function(r){return(!s||r[1]===s)&&r[2]>=min&&r[4]>=dm&&(!q||r[0].toLowerCase().indexOf(q)>=0);});},
    hdr:'<tr><th class="rank">#</th><th>Customer</th><th>Sector</th><th class="num">2024 $</th><th class="num">2025 $</th><th class="num">Drop</th><th></th></tr>',
    row:function(r,i){var dc=r[4]>=70?'drop-high':'drop-med';return'<tr><td class="rank">'+(i+1)+'</td><td class="cust-name">'+hesc(r[0])+'</td><td>'+sb(r[1])+'</td><td class="num">'+fmt(r[2])+'</td><td class="num">'+fmt(r[3])+'</td><td class="num"><span class="drop-pct '+dc+'">&#x25BC;'+r[4]+'%</span></td><td>'+crmLink(r[0])+'</td></tr>';}
  },
  lapsed:{
    title:'First-Time Lapsed',
    note:'Ordered exactly once, never returned.',
    ctls:'<div class="ctl"><label>Min spend $</label><input type="number" id="c1" value="0" min="0" step="100" oninput="onFilter()"></div><div class="ctl"><label>Year</label><select id="c2" onchange="onFilter()"><option value="">Any</option><option>2025</option><option>2024</option><option>2023</option><option>2022</option></select></div><div class="ctl"><label>Sector</label><select id="c3" onchange="onFilter()">'+sOpts+'</select></div>',
    filter:function(rows){var min=parseFloat(document.getElementById('c1').value)||0;var yr=document.getElementById('c2').value;var s=document.getElementById('c3').value;var q=(document.getElementById('search').value||'').toLowerCase();return rows.filter(function(r){return(!s||r[1]===s)&&r[3]>=min&&(!yr||String(r[2])===yr)&&(!q||r[0].toLowerCase().indexOf(q)>=0);});},
    hdr:'<tr><th class="rank">#</th><th>Customer</th><th>Sector</th><th class="num">Year</th><th class="num">Spend $</th><th></th></tr>',
    row:function(r,i){return'<tr><td class="rank">'+(i+1)+'</td><td class="cust-name">'+hesc(r[0])+'</td><td>'+sb(r[1])+'</td><td class="num">'+r[2]+'</td><td class="num"><strong>'+fmt(r[3])+'</strong></td><td>'+crmLink(r[0])+'</td></tr>';}

  medals:{

    ctls:'<div class="ctl"><label>Sector</label><select id="c2" onchange="onFilter()">'+sOpts+'</select></div>',
    filter:function(rows){var s=document.getElementById('c2').value;var q=(document.getElementById('search').value||'').toLowerCase();return rows.filter(function(r){return(!s||r[1]===s)&&(!q||r[0].toLowerCase().indexOf(q)>=0);});},
    hdr:'<tr><th class="rank">#</th><th>Customer</th><th>Sector</th><th class="num">Medals Spend $</th><th></th></tr>',
    row:function(r,i){return'<tr><td class="rank">'+(i+1)+'</td><td class="cust-name">'+hesc(r[0])+'</td><td>'+sb(r[1])+'</td><td class="num">'+fmt(r[2])+'</td><td>'+crmLink(r[0])+'</td></tr>';}
  },
  awards:{

    ctls:'<div class="ctl"><label>Min awards $</label><input type="number" id="c1" value="0" min="0" step="100" oninput="onFilter()"></div><div class="ctl"><label>Sector</label><select id="c2" onchange="onFilter()">'+sOpts+'</select></div>',
    filter:function(rows){var min=parseFloat(document.getElementById('c1').value)||0;var s=document.getElementById('c2').value;var q=(document.getElementById('search').value||'').toLowerCase();return rows.filter(function(r){return(!s||r[1]===s)&&r[2]>=min&&(!q||r[0].toLowerCase().indexOf(q)>=0);});},

document.getElementById('freshness').textContent='QB: '+SNAP.qb+' | Zoho: '+SNAP.zoho+' | Built: '+SNAP.ts;
['sports','dormant','declining','lapsed','medals','awards','badges'].forEach(function(k){var el=document.getElementById('cnt-'+k);if(el)el.textContent=SNAP[k].length;});
function onFilter(){page=0;render();}
function sel(id){
  cur=id;page=0;
  document.querySelectorAll('.sc-btn').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('btn-'+id);if(btn)btn.classList.add('active');
  var s=SCEN[id];
  document.getElementById('sc-title').innerHTML=s.title;
  document.getElementById('sc-controls').innerHTML=s.ctls||'';
  document.getElementById('search').value='';
  render();
}
function render(){
  var s=SCEN[cur];var all=SNAP[cur]||[];filtered=s.filter(all);
  var total=filtered.length;var start=page*pageSize;
  var end=Math.min(start+pageSize,total);var pageRows=filtered.slice(start,end);
  var totalPages=Math.ceil(total/pageSize)||1;
  var h='';
  if(s.note)h+='<div class="note-banner">&#x2139; '+s.note+'</div>';
  h+='<div class="results-meta"><span><strong>'+total.toLocaleString()+'</strong> customer'+(total!==1?'s':'')+(total<all.length?' (filtered from '+all.length.toLocaleString()+')':'')+'</span>';
  h+='<span style="color:#94a3b8;font-size:10.5px">Showing '+(start+1)+'&ndash;'+end+' of '+total.toLocaleString()+'</span></div>';
  h+='<div class="tbl-wrap"><table><thead>'+s.hdr+'</thead><tbody>';
  if(!pageRows.length){h+='<tr><td colspan="10" style="text-align:center;padding:30px;color:#94a3b8">No customers match.</td></tr>';}
  else{pageRows.forEach(function(r,i){h+=s.row(r,start+i);});}
  h+='</tbody></table></div>';
  var pd=page<=0;var nd=page>=totalPages-1;
  h+='<div class="pagination">';
  h+='<button class="pg-btn" onclick="goPage(0)" '+(pd?'disabled':'')+'>&laquo;</button>';
  h+='<button class="pg-btn" onclick="goPage('+(page-1)+')" '+(pd?'disabled':'')+'>&lsaquo; Prev</button>';
  h+='<span class="pg-info">Page '+(page+1)+' of '+totalPages+'</span>';
  h+='<button class="pg-btn" onclick="goPage('+(page+1)+')" '+(nd?'disabled':'')+'>Next &rsaquo;</button>';
  h+='<button class="pg-btn" onclick="goPage('+(totalPages-1)+')" '+(nd?'disabled':'')+'>&raquo;</button>';
  h+='<select class="pg-size" onchange="pageSize=parseInt(this.value);page=0;render()">';
  [50,100,250,9999].forEach(function(v){h+='<option value="'+v+'"'+(pageSize===v?' selected':'')+'>'+(v===9999?'All':v+'/page')+'</option>';});
  h+='</select></div>';
  document.getElementById('results').innerHTML=h;
}
function goPage(p){page=p;render();document.getElementById('results').scrollTop=0;}
sel('sports');
</script>
